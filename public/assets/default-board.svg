<?xml version="1.0"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 496 496" width="496" height="496" role="img" aria-label="Mega OX default board skin">
  <defs>
    <linearGradient id="bd-base" x1="0" y1="0" x2="0" y2="496" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#16192E"></stop>
      <stop offset="0.5" stop-color="#101326"></stop>
      <stop offset="1" stop-color="#0A0C18"></stop>
    </linearGradient>
    <linearGradient id="bd-rim" x1="13" y1="13" x2="483" y2="483" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FF3FA4"></stop>
      <stop offset="0.5" stop-color="#8E83C8"></stop>
      <stop offset="1" stop-color="#1FE0E5"></stop>
    </linearGradient>
    <radialGradient id="bd-glow-pink" cx="0" cy="0" r="240" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FF3FA4" stop-opacity="0.20"></stop>
      <stop offset="0.5" stop-color="#FF3FA4" stop-opacity="0.05"></stop>
      <stop offset="1" stop-color="#FF3FA4" stop-opacity="0"></stop>
    </radialGradient>
    <radialGradient id="bd-glow-cyan" cx="496" cy="496" r="240" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1FE0E5" stop-opacity="0.18"></stop>
      <stop offset="0.5" stop-color="#1FE0E5" stop-opacity="0.045"></stop>
      <stop offset="1" stop-color="#1FE0E5" stop-opacity="0"></stop>
    </radialGradient>
    <radialGradient id="bd-vignette" cx="248" cy="248" r="300" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#04050B" stop-opacity="0"></stop>
      <stop offset="0.6" stop-color="#04050B" stop-opacity="0"></stop>
      <stop offset="1" stop-color="#04050B" stop-opacity="0.55"></stop>
    </radialGradient>
    <linearGradient id="bd-sheen" x1="0" y1="0" x2="0" y2="110" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.06"></stop>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"></stop>
    </linearGradient>

    <pattern id="bd-dots" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#9AAAD0"></circle>
    </pattern>
    <radialGradient id="bd-edgemask" cx="248" cy="248" r="320" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#000000"></stop>
      <stop offset="0.6" stop-color="#000000"></stop>
      <stop offset="1" stop-color="#FFFFFF"></stop>
    </radialGradient>
    <mask id="bd-edge">
      <rect x="0" y="0" width="496" height="496" fill="url(#bd-edgemask)"></rect>
    </mask>

    <clipPath id="bd-clip">
      <rect x="2" y="2" width="492" height="492" rx="30" ry="30"></rect>
    </clipPath>
  </defs>

  
  <g clip-path="url(#bd-clip)">
    <rect x="2" y="2" width="492" height="492" fill="url(#bd-base)"></rect>
    <rect x="2" y="2" width="492" height="492" fill="url(#bd-vignette)"></rect>
    <rect x="2" y="2" width="492" height="492" fill="url(#bd-glow-pink)"></rect>
    <rect x="2" y="2" width="492" height="492" fill="url(#bd-glow-cyan)"></rect>
    <g mask="url(#bd-edge)" opacity="0.06">
      <rect x="2" y="2" width="492" height="492" fill="url(#bd-dots)"></rect>
    </g>
    <rect x="2" y="2" width="492" height="110" fill="url(#bd-sheen)"></rect>
  </g>

  
  <rect x="13" y="13" width="470" height="470" rx="14" ry="14" fill="none" stroke="url(#bd-rim)" stroke-width="1.5" opacity="0.50"></rect>
  <rect x="13" y="13" width="470" height="470" rx="14" ry="14" fill="none" stroke="#000000" stroke-width="1" opacity="0.30" transform="translate(0,1.4)"></rect>

  
  <rect x="3" y="3" width="490" height="490" rx="29" ry="29" fill="none" stroke="#000000" stroke-width="2" opacity="0.40"></rect>
  <rect x="2.5" y="2.5" width="491" height="491" rx="29.5" ry="29.5" fill="none" stroke="#FFFFFF" stroke-width="1" opacity="0.05"></rect>

  
  <g stroke="url(#bd-rim)" stroke-width="2.5" stroke-linecap="round" fill="none" opacity="0.6">
    <path d="M 48 10 L 16 10 Q 10 10 10 16 L 10 48"></path>
    <path d="M 448 10 L 480 10 Q 486 10 486 16 L 486 48"></path>
    <path d="M 486 448 L 486 480 Q 486 486 480 486 L 448 486"></path>
    <path d="M 48 486 L 16 486 Q 10 486 10 480 L 10 448"></path>
  </g>
</svg>