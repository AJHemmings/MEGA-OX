<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Mega OX - Ultimate Naughts and Crosses</title>
    <meta
      name="description"
      content="Play the ultimate Naughts and Crosses experience with macro and micro boards. Challenge AI or play with friends!"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
    <style>
      body {
        margin: 0;
        padding: 0;
        background: #060d1f;
        min-height: 100vh;
        font-family: 'Nunito', system-ui, sans-serif;
      }

      #root {
        min-height: 100vh;
      }
    </style>
    <!-- Suppress dev-only Supabase Realtime Web Locks AbortError from CRA overlay.
         Must run before React bundles load so it fires before CRA's handler. -->
    <script>
      window.addEventListener('unhandledrejection', function(e) {
        if (e.reason && e.reason.name === 'AbortError' &&
            String(e.reason.message).indexOf('Lock broken') !== -1) {
          e.preventDefault();
        }
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
